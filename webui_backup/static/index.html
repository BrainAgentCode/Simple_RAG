<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NASA RAG</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg-body:#fff;--bg-surface:#f9f9fa;--bg-card:#fff;--text-primary:#1a1a1a;--text-secondary:#6e6e80;--text-tertiary:#9ca3af;--border-subtle:#e5e5e5;--accent-blue:#2563eb;--gradient-ai:linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);--radius-sm:6px;--radius-md:12px;--radius-lg:16px;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--font-sans:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--font-mono:'SFMono-Regular',Consolas,monospace;--bg-input:#eff1f5;--bg-sidebar:#f9f9fa;--error:#ef4444;--error-bg:rgba(239,68,68,.1)}
html,body{font-family:var(--font-sans);background:var(--bg-body);color:var(--text-primary);-webkit-font-smoothing:antialiased;line-height:1.6;height:100vh;overflow:hidden}
.chat-layout{display:flex;width:100%;height:100%;overflow:hidden}
.chat-sidebar{width:260px;background:var(--bg-sidebar);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:1.2rem .8rem;display:flex;flex-direction:column;gap:4px}
.sidebar-toggle-wrapper{display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;min-height:32px;padding-left:20px!important;padding-right:20px!important}
.sidebar-logo-btn{border:none;background:transparent;padding:0;margin:0;display:flex;align-items:center;cursor:pointer;gap:8px}
.btn-nav{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;padding:9px 12px 9px 20px;font-family:inherit;font-size:.88rem;font-weight:500;color:#0d0d0d;cursor:pointer;border-radius:8px}
.btn-nav .icon{color:#0d0d0d;display:flex;align-items:center}.btn-nav:hover{background:rgba(0,0,0,.05);border-radius:8px}.btn-nav .btn-text{flex:1;text-align:left}
.sidebar-list{flex:1;overflow-y:auto;padding:0}
.chat-session-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 12px 12px 20px;margin-top:8px}
.chat-session-bar-title{font-size:.7rem;font-weight:600;color:#8f8f8f;text-transform:uppercase;letter-spacing:.05em}
.chat-session-bar-actions{display:flex;gap:4px}
.chat-session-bar-btn{background:transparent;border:none;padding:6px;border-radius:6px;cursor:pointer;color:#8f8f8f;transition:all .15s;display:flex;align-items:center;justify-content:center}.chat-session-bar-btn:hover{background:rgba(239,68,68,.1);color:#ef4444}
.session-list{display:flex;flex-direction:column;gap:.25rem;padding:0 8px}
.chat-session-item{border:none;width:100%;text-align:left;background:transparent;border-radius:8px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px;color:var(--text-primary);cursor:pointer;font-size:.9rem;font-family:inherit;transition:background .15s}
.chat-session-item:hover{background:rgba(0,0,0,.05)}.chat-session-item.active{background:#e0e7ff;color:var(--accent-blue);font-weight:500}
.chat-session-item .session-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-session-delete{opacity:0;visibility:hidden;background:transparent;border:none;padding:4px 6px;border-radius:6px;cursor:pointer;color:var(--text-tertiary);transition:all .15s;font-size:.8rem}
.chat-session-item:hover .chat-session-delete{opacity:1;visibility:visible}.chat-session-delete:hover{background:rgba(239,68,68,.1);color:#ef4444}
.sidebar-footer{margin-top:auto;padding:.8rem 0 1.2rem;border-top:1px solid var(--border-subtle);position:relative;z-index:100}
.settings-menu{position:relative}
.settings-trigger{width:100%;display:flex;align-items:center;gap:10px;background:transparent;border:none;padding:9px 12px 9px 20px;font-family:inherit;font-size:.88rem;font-weight:500;color:#0d0d0d;cursor:pointer;border-radius:8px}.settings-trigger:hover{background:rgba(0,0,0,.05);border-radius:8px}
.settings-user-avatar{width:24px;height:24px;border-radius:999px;background:linear-gradient(135deg,#7c3aed,#9333ea);color:#fff;font-size:.72rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.settings-user-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.settings-dropdown{position:absolute;left:10px;right:10px;bottom:calc(100% + 4px);background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:6px;box-shadow:0 10px 30px -10px rgba(0,0,0,.15),0 4px 12px rgba(0,0,0,.08);display:none;flex-direction:column;gap:2px;z-index:1000;min-width:200px}
.settings-menu.open .settings-dropdown{display:flex}
.settings-divider{height:1px;background:#e5e7eb;margin:4px 6px}
.settings-item{width:100%;display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;border:none;background:transparent;text-align:left;cursor:pointer;color:#0d0d0d;font-size:.9rem;font-family:inherit;transition:background .15s;white-space:nowrap}.settings-item:hover{background:#f5f5f5}
.settings-item .item-icon{width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;color:#0d0d0d;flex-shrink:0}.settings-item .item-text{flex:1;font-weight:500}
.chat-main{flex:1;display:flex;flex-direction:column;position:relative;background:#fff;min-width:0;height:100%;overflow:hidden}
.chat-container{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.chat-container.empty-state{justify-content:center;align-items:center;padding-bottom:15vh}
.chat-container.empty-state .chat-scroll-area{flex:0;display:flex;justify-content:center;align-items:flex-end;padding-bottom:1.5rem;overflow:visible}
.chat-container.empty-state .chat-input-wrapper{padding-bottom:1rem}
.chat-scroll-area{flex:1;overflow-y:auto;padding:2rem max(1rem,calc(50% - 400px));display:flex;flex-direction:column;gap:1.5rem;scroll-behavior:smooth}
.chat-scroll-area::-webkit-scrollbar{width:8px}.chat-scroll-area::-webkit-scrollbar-track{background:transparent}
.chat-scroll-area::-webkit-scrollbar-thumb{background:transparent;border-radius:4px;border:2px solid transparent;background-clip:content-box}
.chat-scroll-area:hover::-webkit-scrollbar-thumb{background-color:rgba(0,0,0,.1);background-clip:content-box}
.empty-state-wrapper{max-width:800px;width:100%;margin:0 auto;display:flex;flex-direction:column;justify-content:center;align-items:center;padding-bottom:1rem}
.greeting-section{text-align:center;width:100%;max-width:800px;padding:0 1rem}
.greeting-gradient{font-size:2.2rem;font-weight:600;background:var(--gradient-ai);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.01em;display:block;line-height:1.25}
.msg-wrap{display:flex;flex-direction:column;max-width:85%;width:100%}
.msg-wrap.user{align-self:flex-end}
.msg-wrap.assistant{align-self:stretch;width:100%;max-width:100%}
.chat-bubble{padding:0;line-height:1.6;font-size:1rem}
.chat-bubble.user{background:#f3f4f6;color:#0d0d0d;padding:.75rem 1.25rem;border-radius:20px 20px 4px 20px;align-self:flex-end}
.chat-bubble.assistant{padding-right:0}
.chat-bubble .msg-content{font-size:.95rem;line-height:1.7;color:#0d0d0d;text-align:justify;text-align-last:left}
.chat-bubble .msg-content p{margin:0 0 .85rem}.chat-bubble .msg-content p:last-child{margin-bottom:0}
.route-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.72rem;font-weight:600;margin-bottom:8px}
.route-rag{background:rgba(11,61,145,.08);color:#0B3D91}.route-simple{background:#fef9c3;color:#854d0e}.route-chitchat{background:#f3e8ff;color:#6b21a8}.route-safety{background:var(--error-bg);color:var(--error)}
.route-list{background:#fef3c7;color:#92400e}.route-detail{background:#dbeafe;color:#1e40af}.route-general{background:#e0e7ff;color:#3730a3}
.rag-details{border:1px solid var(--border-subtle);border-radius:10px;overflow:hidden;margin:8px 0}
.rag-details__content{padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.rag-details__label{font-size:.75rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em}
.rag-doc-card{border:1px solid var(--border-subtle);border-radius:8px;overflow:hidden;font-size:.84rem;margin:4px 0}
.rag-doc-card__header{padding:6px 12px;font-size:.78rem;font-weight:600;color:var(--text-secondary);background:#f1f5f9;border-bottom:1px solid var(--border-subtle)}
.rag-doc-card__row{padding:6px 12px;border-bottom:1px solid var(--border-subtle);line-height:1.5}.rag-doc-card__row:last-child{border-bottom:none}
.rag-doc-card__key{font-size:.75rem;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:2px}.rag-doc-card__value{word-break:break-word}
.msg-actions{display:flex;gap:4px;margin-top:6px;opacity:0;transition:opacity .2s;justify-content:flex-start}.msg-wrap.user .msg-actions{justify-content:flex-end}.msg-wrap:hover .msg-actions{opacity:1}
.msg-action-btn{background:transparent;border:1px solid #e5e7eb;border-radius:6px;padding:4px 8px;cursor:pointer;color:#64748b;display:inline-flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s;line-height:1}.msg-action-btn:hover{background:#f1f5f9;border-color:#cbd5e1;color:#334155}.msg-action-btn:disabled{cursor:not-allowed;opacity:.4}
.msg-action-label{font-size:.78rem;color:#64748b;min-width:2em;text-align:center}
.edit-textarea{width:100%;border:1px solid #3b82f6;border-radius:8px;padding:8px 12px;font-size:.95rem;line-height:1.6;resize:vertical;min-height:40px;max-height:200px;outline:none;font-family:var(--font-sans);color:#0d0d0d;background:#fff}
.verification-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:8px;font-size:.82rem;font-weight:600}
.verification-badge--high{background:rgba(11,61,145,.08);color:#0B3D91;border:1px solid var(--border-subtle)}.verification-badge--mid{background:rgba(245,158,11,.1);color:#d97706;border:1px solid rgba(245,158,11,.3)}.verification-badge--low{background:var(--error-bg);color:var(--error);border:1px solid rgba(239,68,68,.3)}
.chat-input-wrapper{display:flex;justify-content:center;padding:0 1rem 2rem;flex-shrink:0;background:#fff;z-index:10;width:100%}
.chat-input-container{width:100%;max-width:800px;background:#fff;border:1px solid #e5e7eb;box-shadow:0 4px 12px rgba(0,0,0,.08);border-radius:28px;padding:12px 12px 12px 20px;display:flex;flex-direction:column;transition:all .2s}
.chat-input-container:focus-within{border-color:var(--accent-blue);box-shadow:0 6px 16px rgba(0,0,0,.12)}
.chat-input{background:transparent;border:none;padding:4px 0 4px 12px;font-size:1.05rem;color:#0d0d0d;width:100%;outline:none;box-shadow:none;resize:none;min-height:24px;max-height:200px;line-height:1.5;font-family:var(--font-sans)}.chat-input::placeholder{color:#8f8f8f}.chat-input:disabled{background:transparent!important;color:var(--text-secondary);opacity:1;cursor:not-allowed}
.actions-row{display:flex;justify-content:space-between;align-items:center;width:100%;margin-top:4px}
.left-actions{display:flex;align-items:center;gap:8px}.right-actions{display:flex;align-items:center}
.btn-send{width:40px;height:40px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s;padding:0;cursor:pointer;flex-shrink:0}.btn-send:hover{transform:scale(1.05);background:#000}.btn-send:disabled{background:#f3f4f6;color:#d1d5db;cursor:not-allowed;opacity:1}
.btn-stop{width:40px;height:40px;border-radius:50%;background:#ef4444;color:#fff;border:none;display:flex;align-items:center;justify-content:center;padding:0;cursor:pointer;flex-shrink:0;transition:background .2s}.btn-stop:hover{background:#dc2626}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:9999;justify-content:center;align-items:center}.settings-overlay.show{display:flex}
.settings-panel{background:#fff;border-radius:16px;box-shadow:0 25px 60px -12px rgba(0,0,0,.3);width:680px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;overflow:visible}
.settings-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border-subtle)}.settings-title{font-size:1.1rem;font-weight:700}.settings-close{background:transparent;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-secondary);padding:4px 8px;border-radius:6px}.settings-close:hover{background:#f3f4f6}
.settings-body{flex:1;overflow-y:auto;padding:16px 24px}
.settings-section{margin-bottom:20px}.settings-section-title{font-size:.85rem;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border-subtle)}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.settings-field{display:flex;flex-direction:column;gap:4px}.settings-field.full-width{grid-column:1/-1}
.settings-label{font-size:.75rem;font-weight:500;color:var(--text-secondary);margin-bottom:2px}
.settings-input{width:100%;padding:8px 12px;border:1px solid var(--border-subtle);border-radius:var(--radius-sm);font-size:.85rem;color:var(--text-primary);background:var(--bg-input);font-family:var(--font-mono)}.settings-input:focus{outline:none;border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.settings-select{width:100%;padding:8px 12px;border:1px solid var(--border-subtle);border-radius:var(--radius-sm);font-size:.85rem;color:var(--text-primary);background:var(--bg-input);font-family:var(--font-sans);cursor:pointer}.settings-select:focus{outline:none;border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.settings-actions{display:flex;align-items:center;justify-content:flex-end;gap:12px;padding:16px 24px;border-top:1px solid var(--border-subtle);background:#fff}
.btn-settings{padding:8px 20px;border-radius:8px;font-weight:500;font-size:.9rem;cursor:pointer;border:1px solid var(--border-subtle);background:#fff;color:var(--text-primary);font-family:var(--font-sans)}.btn-settings:hover{background:#f3f4f6}.btn-settings.primary{background:var(--accent-blue);color:#fff;border-color:var(--accent-blue)}.btn-settings.primary:hover{background:#1d4ed8}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.fade-in-up{animation:fadeInUp .5s ease-out forwards}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--accent-blue);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{display:flex;align-items:center;gap:8px;padding:12px 20px;color:var(--text-secondary);font-size:.9rem}

/* Markdown content styles */
.msg-content h1,.msg-content h2,.msg-content h3,.msg-content h4,.msg-content h5,.msg-content h6{margin:1rem 0 .5rem;font-weight:600;line-height:1.3}
.msg-content h1{font-size:1.4rem}.msg-content h2{font-size:1.25rem}.msg-content h3{font-size:1.1rem}
.msg-content ul,.msg-content ol{margin:.5rem 0;padding-left:1.5rem}.msg-content li{margin:.25rem 0}
.msg-content blockquote{border-left:3px solid var(--accent-blue);padding-left:1rem;margin:.5rem 0;color:var(--text-secondary)}
.msg-content code:not(pre code){background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:.85em;font-family:var(--font-mono);color:#e11d48}
.msg-content pre{margin:.75rem 0;border-radius:8px;overflow:hidden;background:#f8fafc;border:1px solid var(--border-subtle)}
.msg-content pre code{display:block;padding:1rem;font-size:.85rem;line-height:1.5;overflow-x:auto;background:transparent;color:inherit}
.code-block-wrapper{position:relative;margin:.75rem 0;border-radius:8px;overflow:hidden;border:1px solid var(--border-subtle);background:#f8fafc}
.code-block-header{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#f1f5f9;border-bottom:1px solid var(--border-subtle)}
.code-block-lang{font-size:.72rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em}
.code-block-copy{background:transparent;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;color:var(--text-secondary);font-size:.75rem;display:inline-flex;align-items:center;gap:4px;transition:all .15s}.code-block-copy:hover{background:rgba(0,0,0,.05);color:var(--text-primary)}
.code-block-wrapper pre{margin:0;border:none;border-radius:0}
.table-block-wrapper{position:relative;margin:.75rem 0}.table-scroll{overflow-x:auto;border:1px solid var(--border-subtle);border-radius:8px}
.msg-content table{border-collapse:collapse;width:100%;font-size:.85rem}
.msg-content th,.msg-content td{border:1px solid var(--border-subtle);padding:8px 12px;text-align:left}
.msg-content th{background:#f1f5f9;font-weight:600}
.table-copy-btn{position:absolute;top:4px;right:4px;background:#fff;border:1px solid var(--border-subtle);border-radius:6px;padding:4px 8px;cursor:pointer;color:var(--text-secondary);font-size:.75rem;display:inline-flex;align-items:center;gap:4px;z-index:1;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.1)}.table-copy-btn:hover{background:#f3f4f6;color:var(--text-primary)}
.citation-link{color:var(--accent-blue);cursor:pointer;font-weight:600;padding:0 1px;border-radius:3px;transition:background .15s}.citation-link:hover{background:rgba(37,99,235,.1)}
.ref-item{display:flex;gap:8px;padding:8px 12px;border:1px solid var(--border-subtle);border-radius:8px;margin:4px 0;cursor:pointer;transition:all .15s;font-size:.84rem}.ref-item:hover{background:#f8fafc;border-color:#cbd5e1}
.ref-item-id{font-weight:700;color:var(--accent-blue);min-width:24px}.ref-item-title{flex:1;color:var(--text-primary)}.ref-item-preview{color:var(--text-secondary);font-size:.78rem;margin-top:2px}
@media(max-width:768px){.chat-sidebar{position:fixed;left:-260px;top:0;bottom:0;z-index:200;transition:left .3s}.chat-sidebar.open{left:0}}
</style>
</head>
<body>
<main class="chat-layout">
<aside class="chat-sidebar" id="chatSidebar">
  <header class="sidebar-header">
    <div class="sidebar-toggle-wrapper">
      <button type="button" class="sidebar-logo-btn">
        <svg width="28" height="28" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="48" fill="#0B3D91"/><text x="50" y="60" text-anchor="middle" fill="white" font-size="32" font-weight="bold" font-family="Arial,sans-serif">N</text><ellipse cx="50" cy="50" rx="46" ry="18" fill="none" stroke="#FC3D21" stroke-width="3" transform="rotate(-20 50 50)"/></svg>
        <span style="font-size:1rem;font-weight:700;color:var(--text-primary);margin-left:8px">Simple_RAG</span>
      </button>
    </div>
    <button type="button" id="chat-new-btn" class="btn-nav" onclick="doNewConv()"><span class="icon"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10"/></svg></span><span class="btn-text">新建对话</span></button>
  </header>
  <section class="sidebar-list">
    <div class="chat-session-bar"><div class="chat-session-bar-title"><span>最近</span></div><div class="chat-session-bar-actions"><button class="chat-session-bar-btn" id="clear-all-chats" title="清空全部对话" onclick="doClearAll()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div></div>
    <div class="session-list" id="session-list"></div>
  </section>
  <footer class="sidebar-footer">
    <div class="settings-menu" id="settings-menu">
      <button type="button" class="settings-trigger" id="settings-menu-trigger"><span class="settings-user-avatar">D</span><span class="settings-user-label">default</span></button>
      <div class="settings-dropdown">
        <button type="button" class="settings-item" id="settings-model" onclick="openSettings()"><span class="item-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 16h.01"/><path d="M2.212 11.577a2 2 0 0 0-.212.896V18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5.527a2 2 0 0 0-.212-.896L18.55 5.11A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/><path d="M21.946 12.013H2.054"/><path d="M6 16h.01"/></svg></span><div class="item-text">系统设置</div></button>
      </div>
    </div>
  </footer>
</aside>
<section class="chat-main">
  <div class="chat-container" id="chat-container">
    <div class="chat-scroll-area" id="chat-history">

              <svg id="icon-stop" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>

</section>
</main>

</div></div>

<script>
var state = {ready:false, conversations:{}, current_conv_id:'', messages:[]};
var isStreaming = false;
var abortController = null;

function escH(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

marked.setOptions({
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      return hljs.highlight(code, {language: lang}).value;
    }
    return hljs.highlightAuto(code).value;
  },
  breaks: true,
  gfm: true
});

var renderer = new marked.Renderer();
renderer.code = function(obj) {
  var code = obj.text || obj;
  var lang = obj.lang || '';
  var safeLang = (lang || 'text').replace(/[^a-z0-9_-]/gi, '') || 'text';
  var highlighted;
  try {
    highlighted = lang && hljs.getLanguage(lang)
      ? hljs.highlight(code, {language: lang, ignoreIllegals: true}).value
      : hljs.highlightAuto(code).value;
  } catch(e) { highlighted = escH(code); }
  var copyText = escH(code).replace(/"/g, '&quot;');
  return '<div class="code-block-wrapper"><div class="code-block-header"><span class="code-block-lang">' + escH(safeLang) + '</span><button type="button" class="code-block-copy" onclick="copyCode(this)" data-code="' + copyText + '">复制</button></div><pre><code class="hljs language-' + safeLang + '">' + highlighted + '</code></pre></div>';
};
renderer.link = function(obj) {
  var href = obj.href || '#';
  var title = obj.title || '';
  var text = obj.text || '';
  var titleAttr = title ? ' title="' + escH(title) + '"' : '';
  return '<a href="' + escH(href) + '" target="_blank" rel="noreferrer noopener"' + titleAttr + '>' + text + '</a>';
};
marked.use({renderer: renderer});

function renderMarkdown(text) {
  if (!text) return '';
  var html = marked.parse(text);
  html = html.replace(/\[(\d+)\]/g, '<span class="citation-link" data-source-id="$1">[$1]</span>');
  return DOMPurify.sanitize(html, {ADD_ATTR: ['class', 'target', 'rel', 'data-source-id', 'data-code', 'onclick']});
}

function copyCode(btn) {
  var code = btn.getAttribute('data-code');
  if (code) {
    var decoded = code.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
    navigator.clipboard.writeText(decoded);
    btn.textContent = '已复制';
    btn.style.color = '#16a34a';
    setTimeout(function(){ btn.textContent = '复制'; btn.style.color = ''; }, 1500);
  }
}

function renderAll() {
  var sl = document.getElementById('session-list');
  var keys = Object.keys(state.conversations);
  var shtml = '';
  if (keys.length > 0) {
    for (var i = keys.length - 1; i >= 0; i--) {
      var k = keys[i];
      var t = state.conversations[k].title || '新对话';
      var cls = k === state.current_conv_id ? ' active' : '';
      shtml += '<div class="chat-session-item' + cls + '" onclick="switchSession(\'' + k + '\')"><span class="session-title">' + escH(t) + '</span><button class="chat-session-delete" onclick="event.stopPropagation();deleteSession(\'' + k + '\')" title="删除">✕</button></div>';
    }
  } else { shtml = '<div style="padding:8px 12px;font-size:.82rem;color:#94a3b8;">No history</div>'; }
  sl.innerHTML = shtml;

  var hist = document.getElementById('chat-history');
  var empty = document.getElementById('empty-state');
  if (state.messages.length > 0) {
    if (empty) empty.style.display = 'none';
    hist.querySelectorAll('.msg-wrap,.loading-msg').forEach(function(el){el.remove()});
    for (var i = 0; i < state.messages.length; i++) {
      var m = state.messages[i];
      var wrap = document.createElement('div');
      wrap.className = 'msg-wrap ' + m.role;
      var div = document.createElement('div');
      div.className = 'chat-bubble ' + m.role;
      if (m.role === 'user') {
        div.innerHTML = '<div class="msg-content">' + escH(m.content).replace(/\n/g,'<br>') + '</div>';
        wrap.appendChild(div);
        var actions = document.createElement('div');
        actions.className = 'msg-actions';
        actions.innerHTML = '<button class="msg-action-btn" onclick="editMessage(' + i + ')" title="编辑"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6.14929 4.02032C7.11197 4.02032 7.87983 4.02016 8.49597 4.07598C9.12128 4.13269 9.65792 4.25188 10.1415 4.53106C10.7202 4.8653 11.2008 5.3459 11.535 5.92462C11.8142 6.40818 11.9334 6.94481 11.9901 7.57012C12.0459 8.18625 12.0458 8.95419 12.0458 9.9168C12.0458 10.8795 12.0459 11.6473 11.9901 12.2635C11.9334 12.8888 11.8142 13.4254 11.535 13.909C11.2008 14.4877 10.7202 14.9683 10.1415 15.3025C9.65792 15.5817 9.12128 15.7009 8.49597 15.7576C7.87984 15.8134 7.11196 15.8133 6.14929 15.8133C5.18667 15.8133 4.41874 15.8134 3.80261 15.7576C3.1773 15.7009 2.64067 15.5817 2.1571 15.3025C1.5784 14.9683 1.09778 14.4877 0.76355 13.909C0.484366 13.4254 0.365184 12.8888 0.308472 12.2635C0.252649 11.6473 0.252808 10.8795 0.252808 9.9168C0.252808 8.95418 0.252664 8.18625 0.308472 7.57012C0.365184 6.94481 0.484366 6.40818 0.76355 5.92462C1.09777 5.34589 1.57839 4.86529 2.1571 4.53106C2.64067 4.25188 3.1773 4.13269 3.80261 4.07598C4.41874 4.02017 5.18666 4.02032 6.14929 4.02032Z" fill="currentColor"/></svg></button><button class="msg-action-btn" onclick="copyUserMessage(' + i + ')" title="复制"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 12.5H3.5C2.67157 12.5 2 11.8284 2 11V3C2 2.17157 2.67157 1.5 3.5 1.5H8.5C9.32843 1.5 10 2.17157 10 3V3.5M6.5 14.5H10.5C11.3284 14.5 12 13.8284 12 13V5C12 4.17157 11.3284 3.5 10.5 3.5H4.5C3.67157 3.5 3 4.17157 3 5V13C3 13.8284 3.67157 14.5 4.5 14.5H6.5Z" stroke="currentColor" stroke-width="1.3"></path></svg></button>';
        wrap.appendChild(actions);
      } else if (m.role === 'assistant') {
        var content = m.content || '';
        var extrasHtml = m.extras_html || '';
        div.innerHTML = '<div class="msg-content">' + extrasHtml + renderMarkdown(content) + '</div>';
        wrap.appendChild(div);
        var actions = document.createElement('div');
        actions.className = 'msg-actions';
        var navHtml = '';
        var versions = m.versions || [{content: content, extras_html: extrasHtml}];
        var cv = m.current_version || 0;
        if (versions.length > 1) {
          navHtml = '<button class="msg-action-btn" onclick="switchVersion(' + i + ',' + (cv - 1) + ')"' + (cv <= 0 ? ' disabled' : '') + '><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M7.5 2.5L3.5 6L7.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button><span class="msg-action-label">' + (cv + 1) + '/' + versions.length + '</span><button class="msg-action-btn" onclick="switchVersion(' + i + ',' + (cv + 1) + ')"' + (cv >= versions.length - 1 ? ' disabled' : '') + '><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2.5L8.5 6L4.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>';
        }
        actions.innerHTML = navHtml + '<button class="msg-action-btn" onclick="regenerateMessage(' + i + ')" title="重新生成"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1C4.13401 1 1 4.13401 1 8C1 11.866 4.13401 15 8 15C11.866 15 15 11.866 15 8H13.5C13.5 11.0376 11.0376 13.5 8 13.5C4.96243 13.5 2.5 11.0376 2.5 8C2.5 4.96243 4.96243 2.5 8 2.5C9.61108 2.5 11.0528 3.2184 11.9756 4.37358L10.4523 4.37358V6H15V1.5H10.5V3.29289C9.73234 2.48165 8.65991 2 8 2Z" fill="currentColor"></path></svg></button><button class="msg-action-btn" onclick="copyMessage(' + i + ')" title="复制"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M4 12.5H3.5C2.67157 12.5 2 11.8284 2 11V3C2 2.17157 2.67157 1.5 3.5 1.5H8.5C9.32843 1.5 10 2.17157 10 3V3.5M6.5 14.5H10.5C11.3284 14.5 12 13.8284 12 13V5C12 4.17157 11.3284 3.5 10.5 3.5H4.5C3.67157 3.5 3 4.17157 3 5V13C3 13.8284 3.67157 14.5 4.5 14.5H6.5Z" stroke="currentColor" stroke-width="1.3"></path></svg></button>';
        wrap.appendChild(actions);
      }
      hist.appendChild(wrap);
    }
    setTimeout(function(){hist.scrollTop=hist.scrollHeight},100);
  } else {
    if (empty) empty.style.display = '';
    hist.querySelectorAll('.msg-wrap,.loading-msg').forEach(function(el){el.remove()});
  }

  var inp = document.getElementById('chat-input');
  if (inp) { inp.disabled = !state.ready; inp.placeholder = state.ready ? '向 NASA RAG 提问' : '请先在设置中配置模型...'; }
  document.getElementById('chat-send').disabled = !state.ready;
}

function showLoading() {
  var hist = document.getElementById('chat-history');
  var div = document.createElement('div');
  div.className = 'loading-msg';
  div.id = 'loading-msg';
  div.innerHTML = '<span class="spinner"></span>正在分析问题并检索知识库...';
  hist.appendChild(div);
  hist.scrollTop = hist.scrollHeight;
}
function hideLoading() {
  var el = document.getElementById('loading-msg');
  if (el) el.remove();
}

async function fetchJSON(url, opts) {
  var r = await fetch(url, opts);
  return await r.json();
}

async function refreshState() {
  var data = await fetchJSON('/api/state');
  state.ready = data.system_ready;
  state.conversations = data.conversations || {};
  state.current_conv_id = data.current_conv_id || '';
  if (state.current_conv_id && state.conversations[state.current_conv_id]) {
    state.messages = state.conversations[state.current_conv_id].messages || [];
  } else {
    state.messages = [];
  }
  if (data.settings) loadSettings(data.settings);
  renderAll();
}

function showStreamingUI() {
  isStreaming = true;
  document.getElementById('icon-send').style.display = 'none';
  document.getElementById('icon-stop').style.display = '';
  document.getElementById('chat-send').classList.add('btn-stop');
  document.getElementById('chat-send').classList.remove('btn-send');
  document.getElementById('chat-send').disabled = false;
}

function hideStreamingUI() {
  isStreaming = false;
  abortController = null;
  document.getElementById('icon-send').style.display = '';
  document.getElementById('icon-stop').style.display = 'none';
  document.getElementById('chat-send').classList.remove('btn-stop');
  document.getElementById('chat-send').classList.add('btn-send');
  document.getElementById('chat-send').disabled = !state.ready;
}

function createStreamingMessage() {
  var hist = document.getElementById('chat-history');
  var wrap = document.createElement('div');
  wrap.className = 'msg-wrap assistant';
  wrap.id = 'streaming-msg';
  var div = document.createElement('div');
  div.className = 'chat-bubble assistant';
  div.innerHTML = '<div class="msg-content" id="streaming-content"><span class="spinner"></span></div>';
  wrap.appendChild(div);
  hist.appendChild(wrap);
  hist.scrollTop = hist.scrollHeight;
  return document.getElementById('streaming-content');
}

function updateStreamingMessage(el, text, extrasHtml) {
  if (!el) return;
  var html = (extrasHtml || '') + renderMarkdown(text);
  el.innerHTML = html;
  var hist = document.getElementById('chat-history');
  if (hist) hist.scrollTop = hist.scrollHeight;
}

async function doChatStream(msg, editFrom) {
  showStreamingUI();
  var contentEl = createStreamingMessage();
  var fullText = '';
  var extrasHtml = '';
  var finalData = null;

  abortController = new AbortController();

  try {
    var body = {message: msg};
    if (editFrom !== undefined && editFrom !== null) body.edit_from = editFrom;
    var response = await fetch('/api/chat_stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
      signal: abortController.signal
    });

    if (!response.ok) {
      throw new Error('HTTP ' + response.status);
    }

    var reader = response.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var blocks = buffer.split('\n\n');
      buffer = blocks.pop() || '';

      for (var block of blocks) {
        var lines = block.split('\n');
        for (var line of lines) {
          if (!line.startsWith('data:')) continue;
          var jsonStr = line.slice(5).trim();
          if (!jsonStr) continue;
          try {
            var event = JSON.parse(jsonStr);
            if (event.type === 'token') {
              fullText += event.content || '';
              updateStreamingMessage(contentEl, fullText, extrasHtml);
            } else if (event.type === 'sources') {
              var sources = event.data || [];
              extrasHtml = buildSourcesHtml(sources);
              updateStreamingMessage(contentEl, fullText, extrasHtml);
            } else if (event.type === 'final') {
              finalData = event.data;
              if (finalData && finalData.verification) {
                extrasHtml += buildVerificationHtml(finalData.verification);
              }
              if (finalData && finalData.intent) {
                extrasHtml = buildIntentTag(finalData.intent, finalData.route_type) + extrasHtml;
              }
            } else if (event.type === 'error') {
              fullText = '⚠️ ' + (event.message || 'Unknown error');
              updateStreamingMessage(contentEl, fullText, '');
            }
          } catch(e) {}
        }
      }
    }

    if (fullText) {
      updateStreamingMessage(contentEl, fullText, extrasHtml);
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      updateStreamingMessage(contentEl, '⚠️ ' + e.message, '');
    }
  }

  hideStreamingUI();
  await refreshState();
}

function buildIntentTag(intent, routeType) {
  var il = {rag:'RAG检索', simple:'直接回答', chitchat:'闲聊', safety:'安全过滤'};
  var ic = {rag:'rag', simple:'simple', chitchat:'chitchat', safety:'safety'};
  var html = '<span class="route-tag route-' + (ic[intent]||'general') + '">' + (il[intent]||intent) + '</span>';
  if (routeType) {
    var rl = {list:'列表查询', detail:'详细分析', general:'通用查询'};
    html += '<span class="route-tag route-' + routeType + '">' + (rl[routeType]||'通用查询') + '</span>';
  }
  return html;
}

function buildSourcesHtml(sources) {
  if (!sources || !sources.length) return '';
  var parts = [];
  for (var i = 0; i < sources.length; i++) {
    var s = sources[i];
    var url = s.url ? '<a href="' + escH(s.url) + '" target="_blank" style="color:#2563eb;text-decoration:none;">' + escH(s.title) + '</a>' : escH(s.title);
    parts.push('<div class="rag-doc-card"><div class="rag-doc-card__header">参考文档 ' + (i+1) + '/' + sources.length + '</div><div class="rag-doc-card__row"><span class="rag-doc-card__key">文档</span><span class="rag-doc-card__value">' + url + '</span></div></div>');
  }
  return parts.join('');
}

function buildVerificationHtml(v) {
  if (!v) return '';
  var sc = v.score || 5;
  var lv = sc >= 7 ? 'high' : sc >= 4 ? 'mid' : 'low';
  var issues = '';
  if (v.issues && v.issues.length) {
    issues = v.issues.map(function(i){ return '<div style="font-size:.82rem;color:#6e6e80;padding:2px 0;">- ' + escH(i) + '</div>'; }).join('');
  }
  return '<div class="rag-details"><div class="rag-details__content"><div class="rag-details__label">Answer Verification</div><div class="verification-badge verification-badge--' + lv + '">Score: ' + sc + '/10</div>' + issues + '</div></div>';
}

function editMessage(idx) {
  var msg = state.messages[idx];
  if (!msg || msg.role !== 'user') return;
  var wraps = document.querySelectorAll('.msg-wrap');
  var wrap = wraps[idx];
  if (!wrap) return;
  var bubble = wrap.querySelector('.chat-bubble');
  bubble.innerHTML = '<textarea class="edit-textarea" id="edit-textarea" rows="2">' + escH(msg.content) + '</textarea><div style="display:flex;gap:6px;margin-top:6px"><button class="msg-action-btn" style="border-color:#3b82f6;color:#3b82f6" onclick="saveEdit(' + idx + ')">✓ 保存</button><button class="msg-action-btn" onclick="cancelEdit()">✕ 取消</button></div>';
  var ta = document.getElementById('edit-textarea');
  ta.focus();
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
}

function saveEdit(idx) {
  var ta = document.getElementById('edit-textarea');
  if (!ta) return;
  var newContent = ta.value.trim();
  if (!newContent) return;
  state.messages = state.messages.slice(0, idx);
  renderAll();
  doChatStream(newContent, idx);
}

function cancelEdit() { renderAll(); }

async function regenerateMessage(idx) {
  var userIdx = idx - 1;
  while (userIdx >= 0 && state.messages[userIdx].role !== 'user') userIdx--;
  if (userIdx < 0) return;
  showStreamingUI();
  var contentEl = createStreamingMessage();
  var fullText = '';
  var extrasHtml = '';

  abortController = new AbortController();
  try {
    var response = await fetch('/api/regenerate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({group_index: userIdx}),
      signal: abortController.signal
    });
    var data = await response.json();
    if (data.response) {
      updateStreamingMessage(contentEl, data.response, data.extras_html || '');
    } else if (data.error) {
      updateStreamingMessage(contentEl, '⚠️ ' + data.error, '');
    }
  } catch(e) {
    if (e.name !== 'AbortError') updateStreamingMessage(contentEl, '⚠️ ' + e.message, '');
  }
  hideStreamingUI();
  await refreshState();
}

function switchVersion(idx, verIdx) {
  var userIdx = idx - 1;
  while (userIdx >= 0 && state.messages[userIdx].role !== 'user') userIdx--;
  if (userIdx < 0) return;
  fetchJSON('/api/switch_version', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({group_index: userIdx, version_index: verIdx})}).then(function(){ refreshState(); });
}

function copyUserMessage(idx) {
  var msg = state.messages[idx];
  if (!msg) return;
  navigator.clipboard.writeText(msg.content || '');
  var wraps = document.querySelectorAll('.msg-wrap');
  var wrap = wraps[idx];
  if (wrap) {
    var btns = wrap.querySelectorAll('.msg-action-btn');
    var copyBtn = btns[btns.length - 1];
    if (copyBtn) {
      var orig = copyBtn.innerHTML;
      copyBtn.textContent = '✓ 已复制';
      copyBtn.style.color = '#16a34a';
      setTimeout(function(){copyBtn.innerHTML=orig;copyBtn.style.color='';},1500);
    }
  }
}

function copyMessage(idx) {
  var msg = state.messages[idx];
  if (!msg) return;
  var content = msg.content || '';
  if (msg.versions && msg.versions[msg.current_version || 0]) content = msg.versions[msg.current_version || 0].content;
  navigator.clipboard.writeText(content);
  var wraps = document.querySelectorAll('.msg-wrap');
  var lastWrap = wraps[idx];
  if (lastWrap) {
    var btns = lastWrap.querySelectorAll('.msg-action-btn');
    var copyBtn = btns[btns.length - 1];
    if (copyBtn) {
      var orig = copyBtn.innerHTML;
      copyBtn.textContent = '✓ 已复制';
      copyBtn.style.color = '#16a34a';
      setTimeout(function(){copyBtn.innerHTML=orig;copyBtn.style.color='';},1500);
    }
  }
}

async function doNewConv() {
  await fetchJSON('/api/new_conv', {method:'POST'});
  state.messages = [];
  state.current_conv_id = '';
  renderAll();
}

async function doClearAll() {
  if (!confirm('确定要清空所有对话吗？')) return;
  await fetchJSON('/api/clear_all', {method:'POST'});
  state.conversations = {};
  state.current_conv_id = '';
  state.messages = [];
  renderAll();
}

async function doSwitchConv(id) {
  await fetchJSON('/api/switch_conv', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({conv_id:id})});
  await refreshState();
}

async function doDeleteConv(id) {
  await fetchJSON('/api/delete_conv', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({conv_id:id})});
  await refreshState();
}

function switchSession(id) { doSwitchConv(id); }
function deleteSession(id) { doDeleteConv(id); }

document.getElementById('chat-form').addEventListener('submit', function(e) {
  e.preventDefault();
  if (isStreaming) {
    if (abortController) abortController.abort();
    hideStreamingUI();
    return;
  }
  var inp = document.getElementById('chat-input');
  var v = inp.value.trim();
  if (!v || inp.disabled) return;
  inp.value = '';
  inp.style.height = 'auto';
  doChatStream(v);
});

document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    document.getElementById('chat-form').dispatchEvent(new Event('submit'));
  }
});

document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 200) + 'px';
});

document.getElementById('settings-menu-trigger').addEventListener('click', function(e) {
  e.stopPropagation();
  document.getElementById('settings-menu').classList.toggle('open');
});
document.addEventListener('click', function(e) {
  if (!document.getElementById('settings-menu').contains(e.target))
    document.getElementById('settings-menu').classList.remove('open');
});

function openSettings() {
  document.getElementById('settings-menu').classList.remove('open');
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}
function toggleProvider(v) {
  var o = (v === 'openai');
  ['f_llm_model','f_openai_key','f_openai_url'].forEach(function(i){var e=document.getElementById(i);if(e)e.style.display=o?'':'none'});
  ['f_local_url','f_local_key','f_local_model'].forEach(function(i){var e=document.getElementById(i);if(e)e.style.display=o?'none':''});
}
function loadSettings(s) {
  if (!s) return;
  ['llm_provider','llm_model','openai_api_key','openai_base_url','local_llm_base_url','local_llm_model','local_llm_api_key','temperature','max_tokens','top_k'].forEach(function(f) {
    var e = document.getElementById('s_' + f);
    if (e && s[f] !== undefined) e.value = s[f];
  });
  toggleProvider(s.llm_provider || 'openai');
}
function submitSettings() {
  var fd = new FormData(document.getElementById('settingsForm'));
  var d = {};
  fd.forEach(function(v,k){d[k]=v});
  fetchJSON('/api/settings', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({settings:d})}).then(function(resp) {
    closeSettings();
    if (resp.reinit) {
      state.ready = false;
      renderAll();
      document.getElementById('chat-input').placeholder = '系统正在初始化，请稍候...';
      var poll = setInterval(function() {
        fetchJSON('/api/state').then(function(data) {
          if (data.system_ready) {
            state.ready = true;
            renderAll();
            clearInterval(poll);
          }
        });
      }, 3000);
    } else {
      refreshState();
    }
  });
}

refreshState();
</script>
